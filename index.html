<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,
        initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <title>Editor Markdown</title>
    <link rel="stylesheet" href="./node_modules/simplemde/dist/simplemde.min.css">
    <script src="./node_modules/simplemde/dist/simplemde.min.js"></script>
</head>
<style>
    html,
    body {
        height: 100%;
        display: flex;
        flex: 1;
        flex-direction: column;
    }

    .CodeMirror {
        flex: 1;
    }
</style>

<body ondrop="dropHandler(event);" ondragover="event.preventDefault();">
    <h1 style="text-align: center; font-family: 'Trebuchet MS';">Editor Markdown</h1>

    <textarea id="editor"></textarea>

    <script>

        var editor = new SimpleMDE({
            element: document.getElementById('editor')
        });

        const { ipcRenderer } = require('electron');

        ipcRenderer.on('editor-event', (event, arg) => {
            console.log(arg);
            ipcRenderer.send('editor-reply', `Received ${arg}`);
            if (arg === 'toggle-bold') {
                editor.toggleBold();
            }
            if (arg === 'save') {
                ipcRenderer.send('save', editor.value());
            }
        });
        ipcRenderer.send('editor-reply', 'Page Loaded');

        ipcRenderer.on('load', (event, content) => {
            if (content) {
                editor.value(content);
            }
        });
        ipcRenderer.send('editor-reply', 'Page Loaded');

    function dropHandler(event){
            console.log('Archivo(s) arrastrado');
            event.preventDefault();
            if (event.dataTransfer.items) {
                if (event.dataTransfer.items[0].kind === 'file') {
                    var file = event.dataTransfer.items[0].getAsFile();                    
                    if (file.type === 'text/markdown' || file.name.endsWith('.md')) {
                        var reader = new FileReader();                        
                        reader.onload = e => {
                            editor.codemirror.setValue(e.target.result); 
                        };                        
                        reader.readAsText(file);
                    } else {
                        console.log("Archivo no valido");
                    }
                }
            }
        }
    </script>
</body>

</html>
